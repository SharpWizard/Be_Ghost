<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 320" width="1280" height="320" role="img" aria-label="Be_Ghost banner">
  <defs>
    <linearGradient id="bgB" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0b1220"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
    <linearGradient id="ghostB" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#e0f2fe"/>
      <stop offset="55%" stop-color="#bae6fd"/>
      <stop offset="100%" stop-color="#7c3aed"/>
    </linearGradient>
    <linearGradient id="eyeB" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#22d3ee"/>
      <stop offset="100%" stop-color="#7c3aed"/>
    </linearGradient>
    <linearGradient id="wordmarkGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="80%" stop-color="#a5b4fc"/>
      <stop offset="100%" stop-color="#7c3aed"/>
    </linearGradient>
    <filter id="ghostShadow" x="-10%" y="-10%" width="120%" height="120%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="8"/>
      <feOffset dx="0" dy="8" result="o"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.45"/></feComponentTransfer>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect x="0" y="0" width="1280" height="320" rx="24" fill="url(#bgB)"/>

  <!-- Decorative grid lines -->
  <g opacity="0.06" stroke="#7dd3fc" stroke-width="1">
    <line x1="0"   y1="60"  x2="1280" y2="60"/>
    <line x1="0"   y1="160" x2="1280" y2="160"/>
    <line x1="0"   y1="260" x2="1280" y2="260"/>
  </g>

  <!-- Ghost icon, scaled and centered in left ~25% -->
  <g transform="translate(70, 50) scale(0.43)">
    <path d="M 256 96
             C 158 96, 96 168, 96 248
             L 96 388
             Q 120 416, 144 388
             Q 168 416, 192 388
             Q 216 416, 240 388
             Q 272 416, 296 388
             Q 320 416, 344 388
             Q 368 416, 392 388
             Q 400 396, 416 388
             L 416 248
             C 416 168, 354 96, 256 96 Z"
          fill="url(#ghostB)" opacity="0.94" filter="url(#ghostShadow)"/>
    <ellipse cx="206" cy="232" rx="22" ry="30" fill="#0b1220"/>
    <ellipse cx="306" cy="232" rx="22" ry="30" fill="#0b1220"/>
    <ellipse cx="206" cy="232" rx="10" ry="14" fill="url(#eyeB)" opacity="0.95"/>
    <ellipse cx="306" cy="232" rx="10" ry="14" fill="url(#eyeB)" opacity="0.95"/>
    <rect x="246" y="296" width="20" height="3" rx="1.5" fill="#0b1220" opacity="0.7"/>
    <rect x="234" y="306" width="44" height="3" rx="1.5" fill="#0b1220" opacity="0.7"/>
  </g>

  <!-- Wordmark -->
  <g font-family="ui-monospace, 'SF Mono', Menlo, Consolas, monospace" font-weight="700">
    <text x="320" y="162" font-size="84" fill="url(#wordmarkGrad)" letter-spacing="-2">Be_Ghost</text>
    <text x="322" y="218" font-size="22" fill="#94a3b8" letter-spacing="2">ULTRA-LIGHTWEIGHT  ·  STEALTH  ·  HYBRID</text>
  </g>

  <!-- Tagline pill -->
  <g transform="translate(322, 240)">
    <rect x="0" y="0" width="640" height="42" rx="21" fill="#0b1220" stroke="#22d3ee" stroke-width="1" opacity="0.85"/>
    <text x="20" y="28" font-family="ui-monospace, 'SF Mono', Menlo, Consolas, monospace"
          font-size="18" fill="#bae6fd">$ pip install be_ghost  |  no Chromium needed for lite mode</text>
  </g>

  <!-- Right-side accent: faint terminal cursor -->
  <g transform="translate(1180, 140)" opacity="0.7">
    <rect x="0" y="0" width="14" height="40" fill="#22d3ee">
      <animate attributeName="opacity" values="0.2;1;0.2" dur="1.4s" repeatCount="indefinite"/>
    </rect>
  </g>
</svg>
